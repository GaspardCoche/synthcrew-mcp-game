services:
  synthcrew:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Uncomment and fill to enable real agent execution:
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - GITHUB_TOKEN=ghp_...
      # - BRAVE_API_KEY=...
      # - SLACK_BOT_TOKEN=xoxb-...
      # - NOTION_API_KEY=ntn_...
    volumes:
      - synthcrew-data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Dev mode: hot-reload frontend + backend
  synthcrew-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: npx concurrently "node server/index.js" "npx vite --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    profiles:
      - dev

volumes:
  synthcrew-data:
