# Render — SynthCrew (Web Service)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: synthcrew
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
