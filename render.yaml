# Render Blueprint — SynthCrew (1 service = API + WebSocket + frontend)
# https://render.com/docs/blueprint-spec
# Render déploie le code de la branche indiquée. Pousser (git push) sur cette branche avant de déployer.
services:
  - type: web
    name: synthcrew
    runtime: node
    region: frankfurt
    plan: free
    branch: main

    buildCommand: npm install --include=dev && npm rebuild better-sqlite3 && npm run build
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
